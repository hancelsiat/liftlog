
name: liftlog_mobile
description: "LiftLog mobile app for fitness tracking."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  google_sign_in: ^5.0.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  file_picker: ^10.3.3
  path_provider: ^2.1.2
  url_launcher: ^6.3.0
  video_player: ^2.8.6
  fl_chart: ^0.66.2
  dio: ^5.9.0
  mime: ^2.0.0
  dart_jsonwebtoken: ^3.3.1
  intl: ^0.20.2
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/fitness_logo.webp"
  remove_alph-ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/
